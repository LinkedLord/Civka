<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест для разработчика сервера CivWorld Minecraft</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .nickname-section, .question-card, .results, .progress {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .nickname-input {
            width: 100%;
            padding: 12px;
            font-size: 1.1em;
            border: 2px solid #ddd;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        
        .start-btn, .submit-btn, .restart-btn, .back-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1.1em;
            cursor: pointer;
            transition: transform 0.3s;
        }
        
        .start-btn:hover, .submit-btn:hover {
            transform: translateY(-2px);
        }
        
        .test-area {
            display: none;
        }
        
        .question-text {
            font-size: 1.2em;
            font-weight: bold;
            margin-bottom: 20px;
            color: #333;
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .option {
            display: flex;
            align-items: center;
            padding: 12px;
            background: #f8f9fa;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .option:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }
        
        .option input {
            margin-right: 10px;
            cursor: pointer;
        }
        
        .option label {
            cursor: pointer;
            flex: 1;
        }
        
        .score {
            text-align: center;
            font-size: 2em;
            margin-bottom: 20px;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 10px;
        }
        
        .result-item {
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid;
        }
        
        .result-correct {
            background: #d4edda;
            border-left-color: #28a745;
        }
        
        .result-wrong {
            background: #f8d7da;
            border-left-color: #dc3545;
        }
        
        .restart-btn, .back-btn {
            margin-top: 15px;
            width: 100%;
        }
        
        .warning {
            color: red;
            font-size: 0.9em;
            margin-top: 5px;
            display: none;
        }

        .webhook-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #333;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            cursor: pointer;
            z-index: 1000;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.5em; }
            .question-card { padding: 15px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 Тест для разработчика сервера CivWorld Minecraft 🎮</h1>
        
        <div id="nickname-section" class="nickname-section">
            <h2>👋 Введите ваш никнейм</h2>
            <input type="text" id="nickname" class="nickname-input" placeholder="Ваш игровой никнейм" maxlength="32">
            <div class="warning" id="nickname-warning">Пожалуйста, введите никнейм!</div>
            <button class="start-btn" onclick="startTest()">🚀 Начать тест</button>
        </div>
        
        <div id="test-area" class="test-area">
            <div class="progress" id="progress">📊 Прогресс: 0 из 30</div>
            <div id="questions-container"></div>
            <button class="submit-btn" onclick="submitTest()">📝 Завершить тест</button>
        </div>
        
        <div id="results" class="results" style="display: none;"></div>
    </div>

    <div class="webhook-status" id="webhook-status" onclick="configureWebhook()">
        ⚙️ Настроить Webhook
    </div>

    <script>
        // ⚠️ ВСТАВЬТЕ СВОЙ DISCORD WEBHOOK URL СЮДА ⚠️
        let DISCORD_WEBHOOK_URL = localStorage.getItem('discord_webhook') || '';
        
        // ВСЕ 30 ВОПРОСОВ
        const questions = [
            { id: 1, text: "Как выдать операторские права игроку на сервере?", options: ["/op Игрок", "/giveop Игрок", "/admin Игрок", "/rank Игрок op"], correct: 0 },
            { id: 2, text: "Как настроить EssentialsX, чтобы убрать команду /spawn?", options: ["Удалить плагин", "В config.yml установить spawn-enabled: false", "В командах удалить spawn", "Заблокировать в permissions.yml"], correct: 1 },
            { id: 3, text: "Какой плагин лучше всего подходит для защиты территорий в CivWorld?", options: ["WorldGuard", "GriefPrevention", "Towny", "Factions"], correct: 2 },
            { id: 4, text: "Как создать экономическую валюту на сервере через EssentialsX?", options: ["В config.yml изменить currency-symbol", "/eco create", "Установить Vault и настроить", "Изменить в bukkit.yml"], correct: 2 },
            { id: 5, text: "Как запретить использование команды /tp всем, кроме администраторов?", options: ["Удалить плагин", "В permissions.yml настроить essentials.tp для группы admin", "Использовать /deop", "Установить WorldGuard"], correct: 1 },
            { id: 6, text: "Как создать кастомный рецепт крафта на сервере?", options: ["Через CraftBukkit", "Плагин CustomRecipes", "Изменить server.properties", "Через EssentialsX"], correct: 1 },
            { id: 7, text: "Как настроить ежедневные награды для игроков?", options: ["Плагин DailyRewards", "EssentialsX имеет встроенную функцию", "Через скрипты CommandHelper", "Все варианты верны"], correct: 3 },
            { id: 8, text: "Как изменить максимальное количество игроков на сервере?", options: ["В server.properties max-players", "В bukkit.yml", "В spigot.yml", "Через консоль /setmax"], correct: 0 },
            { id: 9, text: "Как создать систему рангов в CivWorld?", options: ["Через LuckPerms", "Через GroupManager", "Через PermissionsEx", "Все варианты верны"], correct: 3 },
            { id: 10, text: "Как настроить автоматическую перезагрузку сервера?", options: ["Плагин AutoRestart", "Скрипт cron на хостинге", "Через server.properties", "Только вручную"], correct: 1 },
            { id: 11, text: "Как откатить изменения в мире после гриферства?", options: ["CoreProtect", "WorldEdit", "WorldGuard", "GriefPrevention"], correct: 0 },
            { id: 12, text: "Как создать войну между городами в CivWorld?", options: ["Towny имеет встроенную систему войн", "Через Factions", "Через плагин War", "Только модерация"], correct: 0 },
            { id: 13, text: "Как настроить телепортацию на спавн при смерти?", options: ["В EssentialsX config: spawn-on-join: true", "Через WorldGuard", "Через Multiverse-Core", "В server.properties"], correct: 0 },
            { id: 14, text: "Как создать кастомные достижения на сервере?", options: ["Плагин CustomAchievements", "Через Bukkit API", "Через скрипты Skript", "Все варианты"], correct: 3 },
            { id: 15, text: "Как ограничить использование определенных предметов в мире?", options: ["WorldGuard флаги", "ItemRestrict", "ClearLag", "EssentialsX"], correct: 0 },
            { id: 16, text: "Как настроить динамическую карту мира для игроков?", options: ["Плагин Dynmap", "Через Overviewer", "Через Minecraft Server", "Нельзя"], correct: 0 },
            { id: 17, text: "Как создать магазин, где игроки могут продавать предметы?", options: ["Плагин ShopGUI+", "EssentialsX имеет /sell", "ChestShop", "Все варианты"], correct: 3 },
            { id: 18, text: "Как заблокировать игрока по IP-адресу?", options: ["/ban-ip Игрок", "/ipban Игрок", "В banned-ips.json", "Все варианты"], correct: 3 },
            { id: 19, text: "Как создать систему голосования за сервер?", options: ["Плагин VoteParty", "Через NuVotifier", "Через Bukkit", "Все варианты"], correct: 3 },
            { id: 20, text: "Как настроить различные миры с разными правилами?", options: ["Multiverse-Core", "WorldGuard", "EssentialsX", "LuckPerms"], correct: 0 },
            { id: 21, text: "Как создать PvP-арену с автоматическим началом игры?", options: ["Плагин BattleArena", "Через WorldGuard", "Через скрипты", "Все варианты"], correct: 0 },
            { id: 22, text: "Как настроить экономику, чтобы игроки получали деньги за убийство мобов?", options: ["Плагин MobMoney", "Через EssentialsX", "Через Vault", "Все варианты"], correct: 0 },
            { id: 23, text: "Как создать систему кланов с общим хранилищем?", options: ["Плагин SimpleClans", "Через Factions", "Через Towny", "Все варианты"], correct: 3 },
            { id: 24, text: "Как настроить чат с префиксами рангов?", options: ["Плагин ChatManager", "Через LuckPerms", "Через EssentialsX Chat", "Все варианты"], correct: 3 },
            { id: 25, text: "Как запретить использование определенных команд в конкретном мире?", options: ["Multiverse-Core имеет флаги команд", "Через WorldGuard", "Через CommandBlocker", "Все варианты"], correct: 0 },
            { id: 26, text: "Как создать систему событий на сервере?", options: ["Плагин EventsSystem", "Через скрипты Skript", "Через CommandHelper", "Все варианты"], correct: 3 },
            { id: 27, text: "Как настроить резервное копирование мира?", options: ["Плагин Backup", "Скрипт на хостинге", "Ручное копирование", "Все варианты"], correct: 3 },
            { id: 28, text: "Как создать систему приватов для игроков?", options: ["GriefPrevention", "WorldGuard", "Residence", "Все варианты"], correct: 3 },
            { id: 29, text: "Как настроить таблицу лидеров на сайте сервера?", options: ["Плагин LeaderHeads", "Через MySQL и веб-интерфейс", "Через Discord бота", "Все варианты"], correct: 3 },
            { id: 30, text: "Как полностью защитить спавн от разрушений и PvP?", options: ["WorldGuard с флагами build и pvp", "Через GriefPrevention", "Через Towny", "Через Factions"], correct: 0 }
        ];

        let userAnswers = new Array(30).fill(-1);
        let currentNickname = '';

        // Функция отправки в Discord (прямо из браузера)
        async function sendToDiscord(nickname, score, total, wrongAnswers, wrongQuestionsList) {
            if (!DISCORD_WEBHOOK_URL) {
                console.log('Webhook не настроен');
                return;
            }

            const percentage = (score / total * 100).toFixed(1);
            let emoji = '';
            if (percentage >= 90) emoji = '🏆';
            else if (percentage >= 70) emoji = '🎯';
            else if (percentage >= 50) emoji = '📚';
            else emoji = '📖';

            const embed = {
                title: `${emoji} Результаты теста Minecraft CivWorld ${emoji}`,
                color: percentage >= 70 ? 0x00ff00 : (percentage >= 50 ? 0xffa500 : 0xff0000),
                fields: [
                    {
                        name: '👤 Игрок',
                        value: `\`${nickname}\``,
                        inline: true
                    },
                    {
                        name: '📊 Результат',
                        value: `✅ Правильно: ${score}\n❌ Неправильно: ${wrongAnswers}\n📈 Процент: ${percentage}%`,
                        inline: true
                    },
                    {
                        name: '📝 Список ошибок',
                        value: wrongQuestionsList.length > 0 ? wrongQuestionsList.slice(0, 15).join('\n') : '🎉 Нет ошибок! Отличный результат!',
                        inline: false
                    }
                ],
                timestamp: new Date().toISOString(),
                footer: {
                    text: 'Тест для разработчиков CivWorld'
                }
            };

            try {
                const response = await fetch(DISCORD_WEBHOOK_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ embeds: [embed] })
                });
                
                if (response.ok) {
                    console.log('Результаты отправлены в Discord');
                    return true;
                } else {
                    console.error('Ошибка отправки');
                    return false;
                }
            } catch (error) {
                console.error('Ошибка:', error);
                return false;
            }
        }

        function startTest() {
            const nickname = document.getElementById('nickname').value.trim();
            const warning = document.getElementById('nickname-warning');
            
            if (nickname === '') {
                warning.style.display = 'block';
                return;
            }
            
            warning.style.display = 'none';
            currentNickname = nickname;
            
            document.getElementById('nickname-section').style.display = 'none';
            document.getElementById('test-area').style.display = 'block';
            displayQuestions();
        }

        function displayQuestions() {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';
            
            questions.forEach((q, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question-card';
                questionDiv.innerHTML = `
                    <div class="question-text">${index + 1}. ${q.text}</div>
                    <div class="options" id="options-${index}">
                        ${q.options.map((opt, optIndex) => `
                            <div class="option" onclick="selectOption(${index}, ${optIndex})">
                                <input type="radio" name="q${index}" value="${optIndex}" ${userAnswers[index] === optIndex ? 'checked' : ''}>
                                <label>${opt}</label>
                            </div>
                        `).join('')}
                    </div>
                `;
                container.appendChild(questionDiv);
            });
            
            updateProgress();
        }

        function selectOption(questionIndex, optionIndex) {
            userAnswers[questionIndex] = optionIndex;
            const radio = document.querySelector(`input[name="q${questionIndex}"][value="${optionIndex}"]`);
            if (radio) radio.checked = true;
            updateProgress();
        }

        function updateProgress() {
            const answered = userAnswers.filter(a => a !== -1).length;
            document.getElementById('progress').textContent = `📊 Прогресс: ${answered} из 30 вопросов отвечено`;
        }

        async function submitTest() {
            const unanswered = userAnswers.some(a => a === -1);
            if (unanswered) {
                if (!confirm(`Вы ответили не на все вопросы! (${userAnswers.filter(a => a === -1).length} пропущено)\nХотите завершить тест?`)) {
                    return;
                }
            }
            
            // Показываем загрузку
            const submitBtn = document.querySelector('.submit-btn');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = '⏳ Отправка результатов...';
            submitBtn.disabled = true;
            
            // Считаем результаты
            let score = 0;
            const results = [];
            const wrongQuestionsList = [];
            
            questions.forEach((q, index) => {
                const isCorrect = userAnswers[index] === q.correct;
                if (isCorrect) {
                    score++;
                } else {
                    wrongQuestionsList.push(`❌ Вопрос ${q.id}: ${q.text}\n   Ваш ответ: ${userAnswers[index] !== undefined && userAnswers[index] !== -1 ? q.options[userAnswers[index]] : 'Не отвечен'}\n   Правильный: ${q.options[q.correct]}`);
                }
                
                results.push({
                    id: q.id,
                    text: q.text,
                    userAnswer: userAnswers[index] !== undefined && userAnswers[index] !== -1 ? q.options[userAnswers[index]] : 'Не отвечен',
                    correctAnswer: q.options[q.correct],
                    isCorrect: isCorrect
                });
            });
            
            const wrongAnswers = questions.length - score;
            
            // Отправляем в Discord
            let webhookSent = false;
            if (DISCORD_WEBHOOK_URL) {
                webhookSent = await sendToDiscord(currentNickname, score, questions.length, wrongAnswers, wrongQuestionsList);
            }
            
            // Показываем результаты
            displayResults(results, score, wrongAnswers, webhookSent);
            
            submitBtn.textContent = originalText;
            submitBtn.disabled = false;
        }

        function displayResults(results, score, wrongAnswers, webhookSent) {
            const percentage = (score / questions.length * 100).toFixed(1);
            let grade = '';
            if (percentage >= 90) grade = '🏆 Отлично! Вы настоящий эксперт!';
            else if (percentage >= 70) grade = '🎯 Хорошо! Вы знаете много!';
            else if (percentage >= 50) grade = '📚 Неплохо, но нужно подучить!';
            else grade = '📖 Вам стоит изучить администрирование серверов!';
            
            const webhookMessage = webhookSent ? '✅ Результаты отправлены в Discord!' : (DISCORD_WEBHOOK_URL ? '❌ Ошибка отправки в Discord' : '⚠️ Webhook не настроен');
            
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = `
                <div class="score">
                    🎯 Результат игрока: ${currentNickname}<br>
                    ✅ Правильно: ${score} / ${questions.length}<br>
                    ❌ Неправильно: ${wrongAnswers}<br>
                    📈 ${percentage}%<br>
                    ${grade}<br>
                    <small style="font-size: 0.5em;">${webhookMessage}</small>
                </div>
                <button class="restart-btn" onclick="restartTest()">🔄 Пройти тест заново</button>
                <div style="margin-top: 20px;">
                    ${results.map(r => `
                        <div class="result-item ${r.isCorrect ? 'result-correct' : 'result-wrong'}">
                            <strong>Вопрос ${r.id}: ${r.text}</strong><br>
                            ${r.isCorrect ? '✅' : '❌'} Ваш ответ: ${r.userAnswer}<br>
                            ${!r.isCorrect ? `✅ Правильный ответ: ${r.correctAnswer}` : ''}
                        </div>
                    `).join('')}
                </div>
                <button class="back-btn" onclick="location.reload()">🏠 На главную</button>
            `;
            
            resultsDiv.style.display = 'block';
            document.getElementById('test-area').style.display = 'none';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function restartTest() {
            userAnswers = new Array(30).fill(-1);
            document.getElementById('results').style.display = 'none';
            document.getElementById('test-area').style.display = 'block';
            displayQuestions();
        }

        function configureWebhook() {
            const newWebhook = prompt('Введите Discord Webhook URL:', DISCORD_WEBHOOK_URL);
            if (newWebhook !== null) {
                DISCORD_WEBHOOK_URL = newWebhook;
                localStorage.setItem('discord_webhook', newWebhook);
                document.getElementById('webhook-status').style.backgroundColor = newWebhook ? '#28a745' : '#333';
                alert('Webhook сохранён!');
            }
        }

        // Обновляем статус вебхука при загрузке
        if (DISCORD_WEBHOOK_URL) {
            document.getElementById('webhook-status').style.backgroundColor = '#28a745';
        }
    </script>
</body>
</html>
