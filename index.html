<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CivWorld · Тест на Разработчика</title>
  <style>
    * { box-sizing: border-box; margin: 0; font-family: system-ui, 'Segoe UI', Roboto, sans-serif; transition: background 0.3s ease, border-color 0.3s ease; }
    
    /* ТЕМА ПО УМОЛЧАНИЮ (ЗЕЛЁНАЯ) */
    body { background: linear-gradient(145deg, #0d1f0d 0%, #051005 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 24px; }
    .card { max-width: 800px; width: 100%; background: rgba(10, 20, 10, 0.95); border: 1px solid #2e6b2e; border-radius: 36px; padding: 32px 28px; box-shadow: 0 20px 40px rgba(0,0,0,0.9); color: #d4f0c8; }
    h1 { color: #a8e696; border-bottom: 2px dashed #3e7a3e; }
    h1 span { background: #1e401e; color: #c8f0b0; }
    .badge { background: #2e5a2e; color: #c8f0b0; }
    .nick-section { background: #0e1e0e; border-left: 6px solid #5fa05f; border-radius: 28px; padding: 20px 24px; margin: 24px 0 20px; display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
    .nick-input-wrapper { flex: 1; }
    .nick-label { display: block; font-weight: 600; margin-bottom: 10px; font-size: 1.2rem; }
    .nick-input { width: 100%; padding: 16px 20px; border-radius: 48px; font-size: 1.3rem; outline: none; background: #081008; border: 2px solid #2e6b2e; color: #e8ffe0; }
    .player-head { width: 64px; height: 64px; border-radius: 50%; border: 2px solid #5fa05f; background: #1a2a1a; object-fit: cover; }
    .error-msg { color: #ffa098; margin-top: 8px; font-weight: 500; }
    
    /* ТЕМА ДЛЯ САМОПИСОВ (ТЁМНО-КРАСНАЯ) */
    body.selfcode-theme { background: linear-gradient(145deg, #1a0a12 0%, #0d0508 100%); }
    body.selfcode-theme .card { background: rgba(25, 8, 15, 0.95); border: 1px solid #8b3a5e; color: #f0c8d8; }
    body.selfcode-theme h1 { color: #e696b0; border-bottom: 2px dashed #8b3a5e; }
    body.selfcode-theme h1 span { background: #5e1e3a; color: #f0b0c8; }
    body.selfcode-theme .badge { background: #7a2e5a; color: #f0b0c8; }
    body.selfcode-theme .nick-section { background: #1a0e14; border-left: 6px solid #bf5f8f; }
    body.selfcode-theme .nick-input { background: #0d0508; border: 2px solid #8b3a5e; color: #ffe0e8; }
    body.selfcode-theme .player-head { border-color: #bf5f8f; background: #2a1a24; }
    body.selfcode-theme .progress-bar { background: #1a0e14; border: 1px solid #8b3a5e; }
    body.selfcode-theme .progress-fill { background: linear-gradient(90deg, #9e4a6e, #cf7f9f); }
    body.selfcode-theme .quiz-type { background: #5e1e3a; color: #f0b0c8; }
    body.selfcode-theme .back-btn { border: 1px solid #bf5f8f; color: #e090a8; }
    body.selfcode-theme .question-block { background: #1a0e14; border: 1px solid #8b3a5e; }
    body.selfcode-theme .q-title { color: #f0b0c8; }
    body.selfcode-theme .q-num { background: #5e1e3a; }
    body.selfcode-theme .option-item { background: #140a10; border: 1px solid #8b3a5e; }
    body.selfcode-theme .btn { background: #7a2e5a; color: #ffe0e8; border-bottom: 4px solid #3a1430; border: 1px solid #bf5f8f; }
    body.selfcode-theme .btn:hover { background: #9e3e7a; }
    body.selfcode-theme .status { background: #1a0e14; color: #e090a8; }
    body.selfcode-theme .choice-btn.yes { background: #8b2e5a; border-bottom-color: #3a1430; }
    body.selfcode-theme .choice-btn.no { background: #5a2e2e; border-bottom-color: #301414; }
    
    /* Общие стили */
    .progress-bar { border-radius: 30px; padding: 3px; margin: 20px 0 10px; background: #0e1e0e; border: 1px solid #3a6b3a; }
    .progress-fill { height: 12px; border-radius: 30px; width: 0%; transition: width 0.2s; background: linear-gradient(90deg, #4a9e4a, #7fcf7f); }
    .quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .quiz-type { padding: 6px 20px; border-radius: 30px; background: #1e401e; color: #c8f0b0; }
    .back-btn { background: none; padding: 8px 20px; border-radius: 30px; cursor: pointer; font-size: 0.9rem; border: 1px solid #5a9e5a; color: #a8e090; }
    .question-block { border-radius: 24px; padding: 18px 20px; margin-bottom: 20px; background: #0f1e0f; border: 1px solid #2a5a2a; }
    .q-title { font-weight: 700; font-size: 1.15rem; margin-bottom: 14px; display: flex; gap: 10px; color: #c8f0b0; }
    .q-num { border-radius: 30px; min-width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; background: #1e401e; }
    .options { display: flex; flex-direction: column; gap: 10px; }
    .option-item { display: flex; align-items: center; padding: 10px 16px; border-radius: 40px; cursor: pointer; background: #0f1a0f; border: 1px solid #2a5a2a; }
    .option-item input { margin-right: 16px; accent-color: #bf5f8f; width: 18px; height: 18px; cursor: pointer; }
    .option-item label { font-size: 1rem; cursor: pointer; width: 100%; }
    .actions { display: flex; gap: 20px; align-items: center; margin-top: 30px; }
    .btn { padding: 16px 32px; border-radius: 60px; font-weight: bold; font-size: 1.25rem; cursor: pointer; background: #2e5e2e; color: #e8ffe0; border: 1px solid #5a9e5a; }
    .choice-screen { text-align: center; padding: 30px 20px; }
    .choice-question { font-size: 1.8rem; font-weight: 700; margin-bottom: 40px; }
    .choice-buttons { display: flex; gap: 30px; justify-content: center; }
    .choice-btn { padding: 20px 50px; font-size: 1.8rem; font-weight: bold; border: none; border-radius: 60px; cursor: pointer; transition: all 0.2s; }
    .choice-btn.yes { background: #2e7a2e; border-bottom-color: #143014; }
    .choice-btn.no { background: #7a2e2e; border-bottom-color: #301414; }
    .hidden { display: none !important; }
  </style>
</head>
<body id="mainBody">
<div class="card">
  <h1>🌿 CivWorld <span>Тест на Разработчика</span><span class="badge" id="questionCountBadge">7 вопросов</span></h1>

  <!-- Блок ввода ника с головой игрока -->
  <div class="nick-section">
    <img id="playerHead" class="player-head" src="https://minotar.net/avatar/steve/64.png" alt="Голова игрока">
    <div class="nick-input-wrapper">
      <label class="nick-label" for="nickname">📛 Ваш ник в Minecraft</label>
      <input type="text" id="nickname" class="nick-input" placeholder="Например: Notch" maxlength="24" autocomplete="off">
      <div id="nickError" class="error-msg"></div>
    </div>
  </div>

  <!-- ЭКРАН ВЫБОРА -->
  <div id="choiceScreen" class="choice-screen">
    <div class="choice-question">❓ Вы умеете писать самописы?</div>
    <div class="choice-buttons">
      <button class="choice-btn yes" id="choiceYes">✅ ДА</button>
      <button class="choice-btn no" id="choiceNo">❌ НЕТ</button>
    </div>
    <p style="margin-top: 30px; opacity: 0.7;">Выберите вариант, чтобы начать тест</p>
  </div>

  <!-- ЭКРАН ОПРОСА -->
  <div id="quizScreen" class="hidden">
    <div class="quiz-header">
      <span class="quiz-type" id="quizTypeLabel">Обычный опрос</span>
      <button class="back-btn" id="backBtn">← Назад к выбору</button>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="quiz-area" id="quizContainer"></div>
    <div class="actions">
      <button class="btn" id="submitBtn">📨 Отправить результат</button>
    </div>
  </div>
</div>

<script>
  (function() {
    "use strict";
    const WEBHOOK_URL = 'https://discord.com/api/webhooks/1491366949010018455/flv5DTdLiHjFCiX0xBywFxNtLF-TL5oComFgvzlDxnaXlKa8mx8DahgbIfNNEFf4-QiH';

    // ========== ВОПРОСЫ ДЛЯ САМОПИСОВ ==========
    const SELFCODE_QUESTIONS = [
      { text: 'Какой метод используется для регистрации кастомной команды в Bukkit?', options: ['getCommandMap().register()', 'Bukkit.registerCommand()', 'PluginManager.registerCommand()', 'CommandRegistry.add()'], correct: 0 },
      { text: 'Как правильно создать кастомный конфиг в плагине?', options: ['saveDefaultConfig() + getConfig()', 'new YamlConfiguration().load()', 'FileConfiguration.load()', 'Plugin.getConfig()'], correct: 0 },
      { text: 'Какой класс нужно расширить для создания кастомного ивента?', options: ['Event', 'CustomEvent', 'BukkitEvent', 'PluginEvent'], correct: 0 },
      { text: 'Как зарегистрировать кастомный рецепт крафта?', options: ['Bukkit.addRecipe()', 'Server.addRecipe()', 'RecipeManager.register()', 'CraftingManager.addRecipe()'], correct: 1 },
      { text: 'Какой интерфейс используется для кастомного таймера?', options: ['Runnable', 'BukkitRunnable', 'TimerTask', 'ScheduledTask'], correct: 1 },
      { text: 'Как сохранить данные игрока в файл?', options: ['FileConfiguration.save()', 'YamlConfiguration.save()', 'Config.save()', 'Все варианты верны'], correct: 1 },
      { text: 'Что такое Dependency в plugin.yml?', options: ['Зависимость от других плагинов', 'Библиотеки Maven', 'Внешние JAR файлы', 'Системные требования'], correct: 0 }
    ];

    // ========== ОБЫЧНЫЕ ВОПРОСЫ ==========
    const REGULAR_QUESTIONS = [
      { text: 'Что такое LPX?', options: ['Плагин для экономики', 'Анти-Краш система', 'Лаунчер Minecraft', 'Сокращение от LuckPerms eXchange'], correct: 1 },
      { text: 'Как назначить право в LuckPerms?', options: ['/lp user <ник> permission set <узел> true', '/perm add <ник> <право>', 'В файле ops.json', 'Через веб-редактор'], correct: 0 },
      { text: 'Какой контекст НЕ является встроенным в LuckPerms?', options: ['server', 'world', 'gamemode', 'dimension'], correct: 2 },
      { text: 'Что делает команда "/lp verbose"?', options: ['Показывает логи', 'Включает отслеживание проверок прав', 'Очищает кэш', 'Выводит справку'], correct: 1 },
      { text: 'Какой метод PaperAPI для асинхронного чанка?', options: ['getChunkAtAsync()', 'loadChunkAsync()', 'getChunkAsync()', 'requestChunk()'], correct: 0 },
      { text: 'Что такое Aikar\'s Flags?', options: ['Флаги для WorldGuard', 'Оптимизированные JVM флаги', 'Настройки Paper', 'Параметры BungeeCord'], correct: 1 },
      { text: 'Как в LuckPerms применить право в одном мире?', options: ['/lp user <ник> permission set <узел> true world=<мир>', '/lp context', 'В конфиге групп', 'Через мета-теги'], correct: 0 }
    ];

    // ========== ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ ==========
    let currentQuestions = [];
    let quizType = '';
    let userAnswers = [];
    let userIP = 'Не удалось определить';
    let sessionStartTime = new Date();
    let isQuizStarted = false;
    let leaveLogged = false;

    // DOM элементы
    const mainBody = document.getElementById('mainBody');
    const nicknameInput = document.getElementById('nickname');
    const playerHead = document.getElementById('playerHead');
    const nickError = document.getElementById('nickError');
    const choiceScreen = document.getElementById('choiceScreen');
    const quizScreen = document.getElementById('quizScreen');
    const quizContainer = document.getElementById('quizContainer');
    const submitBtn = document.getElementById('submitBtn');
    const progressFill = document.getElementById('progressFill');
    const quizTypeLabel = document.getElementById('quizTypeLabel');
    const questionCountBadge = document.getElementById('questionCountBadge');
    const backBtn = document.getElementById('backBtn');

    // ========== ОБНОВЛЕНИЕ ГОЛОВЫ ==========
    function updatePlayerHead() {
      let nick = nicknameInput.value.trim();
      if (!nick) {
        playerHead.src = 'https://minotar.net/avatar/steve/64.png';
        return;
      }
      playerHead.src = `https://minotar.net/avatar/${encodeURIComponent(nick)}/64.png`;
      playerHead.onerror = () => {
        playerHead.src = 'https://minotar.net/avatar/steve/64.png';
      };
    }

    // ========== ПОЛУЧЕНИЕ IP ==========
    async function fetchUserIP() {
      try {
        const res = await fetch('https://api.ipify.org?format=json');
        const data = await res.json();
        userIP = data.ip;
      } catch(e) {
        userIP = 'Не определено';
      }
    }

    // ========== ОТПРАВКА ВЕБХУКА (уход) ==========
    async function sendLeaveLog(nick, reason) {
      if (!nick || nick.trim() === '' || leaveLogged) return;
      if (!isQuizStarted) return;
      
      leaveLogged = true;
      const timeSpentSeconds = Math.floor((new Date() - sessionStartTime) / 1000);
      const minutes = Math.floor(timeSpentSeconds / 60);
      const seconds = timeSpentSeconds % 60;
      const timeSpentStr = `${minutes} мин ${seconds} сек`;
      
      const embed = {
        title: '🚪 Пользователь покинул тест',
        color: 0xe67e22,
        fields: [
          { name: '👤 Ник', value: `\`${nick}\``, inline: true },
          { name: '🌐 IP', value: `\`${userIP}\``, inline: true },
          { name: '⏱ Время на странице', value: timeSpentStr, inline: false },
          { name: '📌 Причина', value: reason, inline: false },
          { name: '📂 Тип опроса', value: quizType === 'selfcode' ? 'Самописы' : 'Обычный', inline: true },
          { name: '📋 Отвечено вопросов', value: `${userAnswers.filter(a => a !== null).length}/${currentQuestions.length}`, inline: true }
        ],
        footer: { text: 'CivWorld · Аналитика уходов' },
        timestamp: new Date().toISOString()
      };
      
      try {
        await fetch(WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ embeds: [embed] })
        });
      } catch(e) {}
    }

    // ========== ВАЛИДАЦИЯ НИКА ==========
    function validateNick() {
      const nick = nicknameInput.value.trim();
      if (!nick) { nickError.textContent = '⛔ Никнейм обязателен'; return false; }
      if (nick.length < 3 || nick.length > 24) { nickError.textContent = '⛔ Ник от 3 до 24 символов'; return false; }
      if (!/^[a-zA-Z0-9_]+$/.test(nick)) { nickError.textContent = '⛔ Только латиница, цифры и _'; return false; }
      nickError.textContent = ''; return true;
    }

    function applyTheme(type) {
      if (type === 'selfcode') mainBody.classList.add('selfcode-theme');
      else mainBody.classList.remove('selfcode-theme');
    }

    // ========== НАЧАЛО ТЕСТА ==========
    function startQuiz(type) {
      if (!validateNick()) { nicknameInput.focus(); return; }
      
      quizType = type;
      currentQuestions = type === 'selfcode' ? SELFCODE_QUESTIONS : REGULAR_QUESTIONS;
      userAnswers = new Array(currentQuestions.length).fill(null);
      isQuizStarted = true;
      leaveLogged = false;
      sessionStartTime = new Date();
      
      applyTheme(type);
      quizTypeLabel.textContent = type === 'selfcode' ? '🔥 Опрос по самописам' : '📚 Обычный опрос';
      questionCountBadge.textContent = currentQuestions.length + ' вопросов';
      
      choiceScreen.classList.add('hidden');
      quizScreen.classList.remove('hidden');
      
      renderQuiz();
      updateProgress();
    }

    function resetToChoice() {
      quizScreen.classList.add('hidden');
      choiceScreen.classList.remove('hidden');
      mainBody.classList.remove('selfcode-theme');
      isQuizStarted = false;
      leaveLogged = false;
      quizType = '';
      currentQuestions = [];
      userAnswers = [];
    }

    function updateProgress() {
      const answered = userAnswers.filter(a => a !== null).length;
      progressFill.style.width = (answered / currentQuestions.length) * 100 + '%';
    }

    function renderQuiz() {
      let html = '';
      currentQuestions.forEach((q, idx) => {
        const selected = userAnswers[idx];
        html += `<div class="question-block"><div class="q-title"><span class="q-num">${idx+1}</span> ${q.text}</div><div class="options">`;
        q.options.forEach((opt, optIdx) => {
          html += `<div class="option-item" data-q="${idx}" data-opt="${optIdx}">
            <input type="radio" name="q${idx}" value="${optIdx}" id="q${idx}o${optIdx}" ${selected === optIdx ? 'checked' : ''}>
            <label for="q${idx}o${optIdx}">${opt}</label>
          </div>`;
        });
        html += `</div></div>`;
      });
      quizContainer.innerHTML = html;

      document.querySelectorAll('.option-item').forEach(el => {
        el.addEventListener('click', function() {
          const radio = this.querySelector('input[type="radio"]');
          if (radio) { radio.checked = true; radio.dispatchEvent(new Event('change', { bubbles: true })); }
        });
      });

      document.querySelectorAll('input[type="radio"]').forEach(radio => {
        radio.addEventListener('change', function() {
          const qIdx = parseInt(this.name.substring(1));
          const optIdx = parseInt(this.value);
          if (!isNaN(qIdx)) { userAnswers[qIdx] = optIdx; updateProgress(); }
        });
      });
    }

    function calculateScore() {
      let correct = 0, details = [];
      currentQuestions.forEach((q, i) => {
        const isCorrect = userAnswers[i] === q.correct;
        if (isCorrect) correct++;
        details.push({
          question: q.text,
          userAnswer: userAnswers[i] !== null ? q.options[userAnswers[i]] : '❌ не выбрано',
          correctAnswer: q.options[q.correct],
          isCorrect
        });
      });
      return { correctCount: correct, total: currentQuestions.length, percent: Math.round((correct / currentQuestions.length) * 100), details };
    }

    async function sendToWebhook(nick, scoreData, typeLabel) {
      const { percent, details, correctCount, total } = scoreData;
      let answersBlock = '';
      details.forEach((d, i) => {
        answersBlock += `**${i+1}. ${d.question}**\n   ${d.isCorrect ? '✅' : '❌'} Ответ: \`${d.userAnswer}\`\n`;
        if (!d.isCorrect) answersBlock += `   ↳ Правильно: \`${d.correctAnswer}\`\n`;
        answersBlock += `\n`;
      });

      const headUrl = nick ? `https://minotar.net/avatar/${encodeURIComponent(nick)}/64.png` : 'https://minotar.net/avatar/steve/64.png';

      const embed = {
        title: `📊 CivWorld · ${typeLabel}`,
        color: percent >= 70 ? 0x57a857 : (percent >= 40 ? 0xe6b800 : 0xc44536),
        thumbnail: { url: headUrl },
        fields: [
          { name: '👤 Игрок', value: `\`${nick}\` (IP: ${userIP})`, inline: true },
          { name: '📈 Результат', value: `**${percent}%** (${correctCount}/${total})`, inline: true },
          { name: '📂 Тип опроса', value: typeLabel, inline: false },
          { name: '📝 Ответы', value: answersBlock }
        ],
        footer: { text: 'CivWorld · Отбор разработчиков' },
        timestamp: new Date().toISOString()
      };

      try {
        const res = await fetch(WEBHOOK_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ embeds: [embed] }) });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return { success: true };
      } catch (e) { return { success: false, error: e.message }; }
    }

    async function handleSubmit() {
      if (!validateNick()) { nicknameInput.focus(); return; }
      const nick = nicknameInput.value.trim();
      const unanswered = userAnswers.findIndex(a => a === null);
      if (unanswered !== -1) { alert(`⚠️ Ответьте на вопрос №${unanswered+1}`); return; }

      submitBtn.disabled = true;
      submitBtn.textContent = '⏳ Отправка...';
      const score = calculateScore();
      const typeLabel = quizType === 'selfcode' ? 'Опрос по самописам' : 'Обычный опрос';
      const res = await sendToWebhook(nick, score, typeLabel);
      
      if (res.success) {
        alert(`✅ Результат отправлен!\n${nick}: ${score.percent}% (${score.correctCount}/${score.total})`);
        resetToChoice();
      } else {
        alert(`❌ Ошибка отправки: ${res.error}`);
      }
      submitBtn.disabled = false;
      submitBtn.textContent = '📨 Отправить результат';
    }

    function handleVisibilityChange() {
      if (document.hidden && isQuizStarted && !leaveLogged) {
        const nick = nicknameInput.value.trim();
        if (nick) sendLeaveLog(nick, 'Свернул страницу / переключил вкладку');
      }
    }

    function handleBeforeUnload() {
      if (isQuizStarted && !leaveLogged) {
        const nick = nicknameInput.value.trim();
        if (nick) sendLeaveLog(nick, 'Закрыл вкладку / обновил страницу');
      }
    }

    // ========== ИНИЦИАЛИЗАЦИЯ ==========
    async function init() {
      await fetchUserIP();
      updatePlayerHead();
      nicknameInput.addEventListener('input', () => {
        updatePlayerHead();
        validateNick();
      });
      
      document.addEventListener('visibilitychange', handleVisibilityChange);
      window.addEventListener('beforeunload', handleBeforeUnload);
      
      document.getElementById('choiceYes').addEventListener('click', () => startQuiz('selfcode'));
      document.getElementById('choiceNo').addEventListener('click', () => startQuiz('regular'));
      backBtn.addEventListener('click', resetToChoice);
      submitBtn.addEventListener('click', handleSubmit);
    }

    init();
  })();
</script>
</body>
</html>
